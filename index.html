<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finn 5 Fel — Agria Control & Analys</title>
    <style>
        /* ── Reset & Base ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(160deg, #EEF2F7 0%, #E3EAF2 40%, #D8E2EE 100%);
            color: #1a2a3a;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Header ── */
        .header {
            text-align: center;
            padding: 25px 20px 8px;
            position: relative;
        }

        .header-badge {
            display: inline-block;
            background: #002F6C;
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 5px 16px;
            border-radius: 20px;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #002F6C;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 1.05rem;
            color: #5a7088;
        }

        /* ── Score bar ── */
        .score-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 12px 20px;
            flex-wrap: wrap;
        }

        .score-counter {
            background: #fff;
            backdrop-filter: blur(10px);
            border: 1px solid #c8d4e0;
            border-radius: 50px;
            padding: 10px 28px;
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .score-counter .found {
            color: #002F6C;
            font-size: 1.6rem;
        }

        .progress-bar-container {
            width: 250px;
            height: 10px;
            background: rgba(0,47,108,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #002F6C, #1565C0);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .btn {
            background: #fff;
            border: 1px solid #c0cdd8;
            color: #1a2a3a;
            padding: 8px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        .btn:hover {
            background: #e3edf7;
            border-color: #002F6C;
        }

        .btn.active {
            background: rgba(0, 47, 108, 0.1);
            border-color: #002F6C;
            color: #002F6C;
        }

        /* ── Images container ── */
        .game-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 10px 20px 30px;
            flex-wrap: wrap;
        }

        .image-panel {
            position: relative;
            flex: 1;
            max-width: 48%;
            min-width: 350px;
            overflow: visible;
        }

        .image-panel .label {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(8px);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            z-index: 5;
            border: 1px solid #c8d4e0;
            color: #1a2a3a;
        }

        .image-panel img {
            width: 100%;
            display: block;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,47,108,0.12);
        }

        /* ── Clickable zones on error image ── */
        .click-zone {
            position: absolute;
            cursor: default;
            border: 3px solid transparent;
            border-radius: 50%;
            transition: all 0.3s ease;
            z-index: 3;
        }

        .click-zone:hover {
            background: rgba(0, 47, 108, 0.12);
            border-color: rgba(0, 47, 108, 0.4);
        }

        .click-zone.found {
            border-color: #FFD600 !important;
            background: rgba(255, 214, 0, 0.15) !important;
            box-shadow: 0 0 14px 4px rgba(255, 214, 0, 0.5);
            cursor: default;
            animation: foundPulse 0.6s ease;
        }

        .click-zone.found::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.8rem;
            color: #FFD600;
            text-shadow: 0 0 6px rgba(0,0,0,0.5);
            font-weight: bold;
        }

        @keyframes foundPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* ── Grid overlay (debug/helper) ── */
        .grid-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 4;
            display: none;
            border-radius: 12px;
            overflow: hidden;
        }

        .grid-overlay.visible {
            display: block;
        }

        .grid-line-h, .grid-line-v {
            position: absolute;
            background: rgba(255, 255, 255, 0.15);
        }

        .grid-line-h {
            width: 100%;
            height: 1px;
        }

        .grid-line-v {
            width: 1px;
            height: 100%;
        }

        .grid-label {
            position: absolute;
            font-size: 9px;
            color: rgba(255,255,255,0.5);
            pointer-events: none;
        }

        /* ── Coordinate display ── */
        .coord-display {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: rgba(0,47,108,0.9);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #fff;
            z-index: 100;
            display: none;
            border: 1px solid rgba(0,47,108,0.3);
        }

        .coord-display.visible {
            display: block;
        }

        /* ── Modal ── */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(6px);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: #fff;
            border: 1px solid #c8d4e0;
            border-radius: 20px;
            padding: 0;
            max-width: 560px;
            width: 92%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 25px 60px rgba(0,0,0,0.2);
            transform: scale(0.85) translateY(30px);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), max-width 0.3s ease;
        }

        .modal.modal-wide {
            max-width: 95vw;
            width: fit-content;
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            background: linear-gradient(135deg, #002F6C, #003B73);
            padding: 28px 32px;
            text-align: center;
            position: relative;
        }

        .modal-icon {
            font-size: 3rem;
            margin-bottom: 8px;
        }

        .modal-name {
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0;
        }

        .modal-number {
            position: absolute;
            top: 14px;
            right: 14px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.85rem;
        }

        .modal-close {
            position: absolute;
            top: 14px;
            left: 14px;
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            z-index: 2;
        }

        .modal-close:hover {
            background: rgba(255,255,255,0.3);
        }

        .modal-photo-container {
            width: 100%;
            max-height: 220px;
            overflow: hidden;
            display: none;
        }

        .modal-photo-container.has-photo {
            display: block;
        }

        .modal-photo {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .modal-content {
            padding: 24px 32px 32px;
        }

        .modal-description {
            font-size: 0.95rem;
            color: #4a5e72;
            line-height: 1.7;
            white-space: pre-line;
        }

        .modal-description strong {
            color: #002F6C;
        }

        /* ── Person cards grid ── */
        .person-cards {
            display: flex;
            gap: 18px;
            margin-top: 18px;
            padding-bottom: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .person-card {
            background: #f7f9fc;
            min-width: 180px;
            max-width: 200px;
            flex-shrink: 0;
            border: 1px solid #e0e7ef;
            border-radius: 14px;
            padding: 18px 14px 16px;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .person-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,47,108,0.1);
        }

        .person-card-photo {
            width: 150px;
            height: 150px;
            border-radius: 16px;
            margin: 0 auto 12px;
            box-shadow: 0 3px 12px rgba(0,47,108,0.12);
            background-color: #dce4ed;
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
        }

        .person-card-initials {
            width: 150px;
            height: 150px;
            border-radius: 16px;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #002F6C, #1565C0);
            box-shadow: 0 3px 12px rgba(0,47,108,0.12);
        }

        .person-card-name {
            font-weight: 700;
            font-size: 0.82rem;
            color: #1a2a3a;
            line-height: 1.3;
            margin-bottom: 4px;
        }

        .person-card-role {
            font-size: 0.72rem;
            color: #5a7088;
            line-height: 1.3;
        }

        .person-card-bio {
            font-size: 0.73rem;
            color: #4a5e72;
            line-height: 1.5;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #e8edf3;
            text-align: left;
        }

        /* ── Quiz ranking ── */
        .quiz-ranking {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .quiz-ranking li {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 6px;
            transition: background 0.2s;
            position: relative;
        }

        .quiz-ranking li:nth-child(1) { background: linear-gradient(90deg, rgba(255,215,0,0.12), transparent); }
        .quiz-ranking li:nth-child(2) { background: linear-gradient(90deg, rgba(192,192,192,0.12), transparent); }
        .quiz-ranking li:nth-child(3) { background: linear-gradient(90deg, rgba(205,127,50,0.12), transparent); }

        .rank-pos {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .rank-1 .rank-pos { background: #FFD700; color: #5a4800; }
        .rank-2 .rank-pos { background: #C0C0C0; color: #444; }
        .rank-3 .rank-pos { background: #CD7F32; color: #fff; }
        .quiz-ranking li:nth-child(n+4) .rank-pos {
            background: #EEF2F7;
            color: #5a7088;
        }

        .rank-flag {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .rank-country {
            font-weight: 600;
            color: #1a2a3a;
            font-size: 1rem;
            flex-grow: 1;
        }

        .rank-bar {
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(90deg, #002F6C, #1976D2);
            position: absolute;
            bottom: 2px;
            left: 60px;
            opacity: 0.15;
        }

        .rank-1 { font-size: 1.05rem; }
        .rank-medal { font-size: 0.8rem; margin-left: auto; flex-shrink: 0; }

        .quiz-title {
            text-align: center;
            color: #002F6C;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 2px solid #EEF2F7;
        }

        /* ── Confetti ── */
        .confetti-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 200;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -20px;
            opacity: 0;
        }

        /* ── Win banner ── */
        .win-banner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: #fff;
            border: 2px solid #002F6C;
            border-radius: 24px;
            padding: 40px 60px;
            text-align: center;
            z-index: 150;
            box-shadow: 0 30px 80px rgba(0,0,0,0.2);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .win-banner.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .win-banner .trophy {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .win-banner h2 {
            font-size: 2rem;
            color: #002F6C;
        }

        .win-banner p {
            color: #5a7088;
            margin-top: 8px;
            font-size: 1.1rem;
        }

        /* ── Missing image placeholder ── */
        .image-placeholder {
            width: 100%;
            aspect-ratio: 16/9;
            background: linear-gradient(135deg, rgba(0,47,108,0.04), rgba(0,47,108,0.02));
            border: 2px dashed #c0cdd8;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #7a8ea0;
            font-size: 1rem;
            gap: 10px;
        }

        .image-placeholder .icon {
            font-size: 3rem;
        }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .image-panel {
                max-width: 95%;
                min-width: 0;
            }
            .game-container {
                flex-direction: column;
                align-items: center;
            }
            .header h1 { font-size: 1.5rem; }
            .intro-card { max-width: 95%; padding: 30px 24px; }
            .intro-card h2 { font-size: 1.6rem; }
            .info-modal { max-width: 95%; padding: 30px 24px; }
            .modal { max-width: 95%; }
            .modal.modal-wide { max-width: 95%; }
        }

        /* ── Info modal (about the department) ── */
        .info-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .info-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .info-modal {
            background: #fff;
            border-radius: 20px;
            padding: 40px 38px;
            max-width: 540px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,47,108,0.2);
            text-align: center;
            border-top: 4px solid #002F6C;
            transform: scale(0.9) translateY(20px);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .info-overlay.active .info-modal {
            transform: scale(1) translateY(0);
        }

        .info-modal .info-badge {
            display: inline-block;
            background: #002F6C;
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            padding: 5px 18px;
            border-radius: 20px;
            margin-bottom: 16px;
        }

        .info-modal h2 {
            font-size: 1.7rem;
            font-weight: 700;
            color: #002F6C;
            margin-bottom: 14px;
            line-height: 1.25;
        }

        .info-modal p {
            font-size: 0.95rem;
            color: #4a5e72;
            line-height: 1.7;
            white-space: pre-line;
            margin-bottom: 24px;
            text-align: left;
        }

        .info-close-btn {
            display: inline-block;
            background: #002F6C;
            color: #fff;
            border: none;
            padding: 12px 32px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .info-close-btn:hover {
            background: #003B73;
        }

        .btn-info {
            background: #002F6C;
            color: #fff;
            border: 1px solid #002F6C;
            font-weight: 600;
        }

        .btn-info:hover {
            background: #003B73;
        }
    </style>
</head>
<body>

    <!-- Info modal (about the department) -->
    <div class="info-overlay" id="infoOverlay">
        <div class="info-modal">
            <div class="info-badge">Agria Djurförsäkring</div>
            <h2 id="infoHeading">Om Control & Analys</h2>
            <p id="infoText"></p>
            <button class="info-close-btn" id="infoCloseBtn">Stäng</button>
        </div>
    </div>

    <!-- Header -->
    <div class="header">
        <div class="header-badge">Agria • Control & Analys</div>
        <h1 id="gameTitle">Finn 15 Fel</h1>
        <p id="gameSubtitle">Klicka på skillnaderna i högerbilden!</p>
    </div>

    <!-- Score bar -->
    <div class="score-bar">
        <button class="btn btn-info" id="infoBtn" title="Om avdelningen">
            ℹ️ Om oss
        </button>
        <div class="score-counter">
            Hittade: <span class="found" id="foundCount">0</span> / <span id="totalCount">18</span>
        </div>
        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <button class="btn dev-only" id="toggleGrid" title="Visar ett rutnät med koordinater för att placera klickzoner">
            📐 Visa hjälplinjer
        </button>
        <button class="btn dev-only" id="toggleZones" title="Visa/dölj klickzonerna">
            👁 Visa klickzoner
        </button>
        <button class="btn" id="restartBtn" title="Börja om från början">
            🔄 Starta om
        </button>
    </div>

    <!-- Game images -->
    <div class="game-container">
        <!-- Original image -->
        <div class="image-panel" id="originalPanel">
            <div class="label">✅ Original</div>
        </div>

        <!-- Error image (clickable) -->
        <div class="image-panel" id="errorPanel">
            <div class="label">🔍 Hitta felen!</div>
            <div class="grid-overlay" id="gridOverlay"></div>
        </div>
    </div>

    <!-- Coordinate display (debug aid) -->
    <div class="coord-display" id="coordDisplay">
        x: <span id="coordX">0</span>%, y: <span id="coordY">0</span>%
    </div>

    <!-- Group/Quiz modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <button class="modal-close" id="modalClose">✕</button>
                <div class="modal-number" id="modalNumber">1</div>
                <div class="modal-icon" id="modalIcon">📊</div>
                <div class="modal-name" id="modalName">Namn</div>
            </div>
            <div class="modal-photo-container" id="modalPhotoContainer">
                <div id="modalPhotoWrapper"></div>
            </div>
            <div class="modal-content">
                <div class="modal-description" id="modalDesc">Beskrivning</div>
            </div>
        </div>
    </div>

    <!-- Win banner -->
    <div class="win-banner" id="winBanner">
        <div class="trophy">🏆</div>
        <h2>Alla 5 fel hittade!</h2>
        <p>Bra jobbat! Nu känner du Control & Analys på Agria.</p>
    </div>

    <!-- Confetti -->
    <div class="confetti-container" id="confettiContainer"></div>

    <script>
        // Try loading config from external file, fall back to inline
        if (typeof CONFIG === 'undefined') {
            console.warn('config.js not loaded externally — check if using file:// protocol');
        }
    </script>
    <script src="config.js"></script>
    <script>
        // Verify config loaded
        if (typeof CONFIG === 'undefined') {
            alert('FEL: config.js kunde inte laddas!\n\nDu behöver starta spelet via start.py (dubbelklicka på den filen) istället för att öppna index.html direkt.\n\nAlternativt, kör: python start.py');
            throw new Error('CONFIG not loaded');
        }
        console.log('CONFIG loaded OK, people count:', CONFIG.people.length);
        console.log('First person x/y:', CONFIG.people[0].x, CONFIG.people[0].y);

        // ── Info modal ──
        const infoOverlay = document.getElementById('infoOverlay');
        if (CONFIG.intro) {
            document.getElementById('infoHeading').textContent = CONFIG.intro.heading;
            document.getElementById('infoText').textContent = CONFIG.intro.text;
        }
        document.getElementById('infoBtn').addEventListener('click', () => {
            infoOverlay.classList.add('active');
        });
        document.getElementById('infoCloseBtn').addEventListener('click', () => {
            infoOverlay.classList.remove('active');
        });
        infoOverlay.addEventListener('click', (e) => {
            if (e.target === infoOverlay) infoOverlay.classList.remove('active');
        });

        // ── Dev mode: hide dev buttons ──
        if (!CONFIG.devMode) {
            document.querySelectorAll('.dev-only').forEach(el => el.style.display = 'none');
        }

        // ── State ──
        let foundErrors = new Set();
        let showGrid = false;
        let showZones = false;
        const total = CONFIG.people.length;

        // ── Restart ──
        document.getElementById('restartBtn').addEventListener('click', () => {
            foundErrors.clear();
            document.querySelectorAll('.click-zone').forEach(zone => {
                zone.classList.remove('found');
                zone.style.borderColor = showZones ? 'rgba(0,47,108,0.5)' : 'transparent';
                zone.style.background = showZones ? 'rgba(0,47,108,0.08)' : 'transparent';
            });
            updateScore();
            winBanner.classList.remove('show');
        });

        // ── DOM refs ──
        const originalPanel = document.getElementById('originalPanel');
        const errorPanel = document.getElementById('errorPanel');
        const foundCountEl = document.getElementById('foundCount');
        const totalCountEl = document.getElementById('totalCount');
        const progressBar = document.getElementById('progressBar');
        const gridOverlay = document.getElementById('gridOverlay');
        const coordDisplay = document.getElementById('coordDisplay');
        const coordX = document.getElementById('coordX');
        const coordY = document.getElementById('coordY');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalClose = document.getElementById('modalClose');
        const modalNumber = document.getElementById('modalNumber');
        const modalIcon = document.getElementById('modalIcon');
        const modalPhotoContainer = document.getElementById('modalPhotoContainer');
        const modalPhotoWrapper = document.getElementById('modalPhotoWrapper');
        const modalName = document.getElementById('modalName');
        const modalDesc = document.getElementById('modalDesc');
        const winBanner = document.getElementById('winBanner');

        // ── Init ──
        document.getElementById('gameTitle').textContent = CONFIG.title;
        document.getElementById('gameSubtitle').textContent = CONFIG.subtitle;
        totalCountEl.textContent = total;

        // ── Placeholder colors (Agria blue palette) ──
        const PERSON_COLORS = [
            '#002F6C','#1565C0','#0D47A1','#1976D2','#003B73','#2196F3',
            '#1E88E5','#42A5F5','#0277BD','#0288D1','#01579B','#1B3A5C',
            '#004D99','#0060B0','#0078D4','#2B5EA7','#194775','#3580C2'
        ];

        // Generate a canvas-based group image placeholder
        function generateGroupPlaceholder(isErrorVersion) {
            const canvas = document.createElement('canvas');
            canvas.width = 1200;
            canvas.height = 675;
            const ctx = canvas.getContext('2d');

            // Background
            const grad = ctx.createLinearGradient(0, 0, 1200, 675);
            grad.addColorStop(0, '#EEF2F7');
            grad.addColorStop(0.5, '#E0E8F0');
            grad.addColorStop(1, '#D4DEE8');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 1200, 675);

            // Blue top bar + red accent
            ctx.fillStyle = '#002F6C';
            ctx.fillRect(0, 0, 1200, 6);
            ctx.fillStyle = '#E4002B';
            ctx.fillRect(0, 6, 1200, 2);

            // Title
            ctx.fillStyle = '#002F6C';
            ctx.font = 'bold 24px Segoe UI, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(isErrorVersion ? '🔍 HITTA 5 FEL!' : '✅ ORIGINALBILD', 600, 42);

            // Draw 5 group zones as labeled rectangles
            const zones = CONFIG.people;
            const zoneColors = ['#002F6C', '#1565C0', '#0D47A1', '#003B73', '#E4002B'];
            zones.forEach((zone, i) => {
                const zx = zone.x / 100 * 1200;
                const zy = zone.y / 100 * 675;
                const zw = zone.width / 100 * 1200;
                const zh = zone.height / 100 * 675;
                const color = zoneColors[i % zoneColors.length];

                ctx.fillStyle = color + '15';
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(zx, zy, zw, zh, 8);
                ctx.fill();
                ctx.stroke();

                ctx.fillStyle = color;
                ctx.font = 'bold 14px Segoe UI, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(`${zone.icon} ${zone.name}`, zx + zw/2, zy + zh/2 + 5);
            });

            // Watermark
            ctx.fillStyle = 'rgba(0,47,108,0.12)';
            ctx.font = '14px Segoe UI, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('AGRIA • CONTROL & ANALYS — Placeholder', 600, 660);

            return canvas.toDataURL('image/png');
        }

        // Generate portrait placeholder
        function generatePortraitPlaceholder(person, idx) {
            const canvas = document.createElement('canvas');
            canvas.width = 400;
            canvas.height = 400;
            const ctx = canvas.getContext('2d');
            const color = PERSON_COLORS[idx % PERSON_COLORS.length];

            // Background gradient
            const grad = ctx.createLinearGradient(0, 0, 400, 400);
            grad.addColorStop(0, color);
            grad.addColorStop(1, shadeColor(color, -40));
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 400, 400);

            // Silhouette
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.beginPath();
            ctx.arc(200, 140, 65, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.roundRect(130, 220, 140, 100, 20);
            ctx.fill();

            // Name
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 26px Segoe UI, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(person.name, 200, 360);

            // "Bild saknas"
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.font = '14px Segoe UI, sans-serif';
            ctx.fillText('📷 Porträttbild saknas', 200, 388);

            return canvas.toDataURL('image/png');
        }

        function shadeColor(color, percent) {
            const num = parseInt(color.replace('#',''), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.min(255, Math.max(0, (num >> 16) + amt));
            const G = Math.min(255, Math.max(0, (num >> 8 & 0x00FF) + amt));
            const B = Math.min(255, Math.max(0, (num & 0x0000FF) + amt));
            return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
        }

        // Load images with canvas placeholder fallback
        function loadImageOrPlaceholder(panel, src, altText, isErrorVersion) {
            const img = new Image();
            img.onload = () => {
                img.alt = altText;
                img.draggable = false;
                panel.appendChild(img);
            };
            img.onerror = () => {
                const fallback = new Image();
                fallback.src = generateGroupPlaceholder(isErrorVersion);
                fallback.alt = altText;
                fallback.draggable = false;
                panel.appendChild(fallback);
            };
            img.src = src;
        }

        loadImageOrPlaceholder(originalPanel, CONFIG.originalImage, 'Originalbild', false);
        loadImageOrPlaceholder(errorPanel, CONFIG.errorsImage, 'Bild med fel', true);

        // ── Create click zones ──
        CONFIG.people.forEach((person, idx) => {
            const zone = document.createElement('div');
            zone.className = 'click-zone';
            zone.dataset.index = idx;
            zone.style.left = person.x + '%';
            zone.style.top = person.y + '%';
            zone.style.width = person.width + '%';
            zone.style.height = person.height + '%';

            console.log(`Zone ${idx} "${person.name}": left=${person.x}%, top=${person.y}%, w=${person.width}%, h=${person.height}%`);

            // Initially transparent border for alignment help
            if (!showZones) {
                zone.style.borderColor = 'transparent';
            }

            zone.addEventListener('click', (e) => {
                e.stopPropagation();
                if (foundErrors.has(idx)) {
                    // Already found - show info again
                    openModal(idx);
                    return;
                }
                foundErrors.add(idx);
                zone.classList.add('found');
                updateScore();
                openModal(idx);

                if (foundErrors.size === total) {
                    pendingWin = true;
                }
            });

            errorPanel.appendChild(zone);
        });

        // ── Score ──
        function updateScore() {
            foundCountEl.textContent = foundErrors.size;
            progressBar.style.width = (foundErrors.size / total * 100) + '%';
        }

        // ── Modal ──
        function openModal(idx) {
            const item = CONFIG.people[idx];
            const modalEl = document.querySelector('.modal');
            modalNumber.textContent = idx + 1;
            modalIcon.textContent = item.icon || '❓';
            modalName.textContent = item.name;

            // Photo (optional for groups)
            modalPhotoWrapper.innerHTML = '';
            modalPhotoContainer.classList.remove('has-photo');
            if (item.photo) {
                const img = new Image();
                img.className = 'modal-photo';
                img.alt = item.name;
                img.onload = () => {
                    modalPhotoWrapper.appendChild(img);
                    modalPhotoContainer.classList.add('has-photo');
                };
                img.src = item.photo;
            }

            // Content: quiz ranking, group with person cards, or plain description
            if (item.type === 'quiz' && item.description === 'QUIZ_RANKING') {
                modalEl.classList.remove('modal-wide');
                modalDesc.innerHTML = buildQuizRanking();
            } else if (item.type === 'group' && item.members && item.members.length > 0) {
                modalEl.classList.add('modal-wide');
                modalDesc.innerHTML = buildPersonCards(item);
            } else {
                modalEl.classList.remove('modal-wide');
                modalDesc.innerHTML = item.description;
            }

            modalOverlay.classList.add('active');
        }

        // Build person cards HTML for group modals
        function buildPersonCards(item) {
            let html = `<div style="margin:0 0 18px; line-height:1.7; color:#4a5e72; padding-bottom:16px; border-bottom:2px solid #EEF2F7;">${item.description}</div>`;
            html += '<div class="person-cards">';
            item.members.forEach(m => {
                const initials = m.name.split(' ').map(w => w[0]).join('').substring(0, 2);
                const bioHtml = m.bio ? `<div class="person-card-bio">${m.bio}</div>` : '';
                html += `
                    <div class="person-card">
                        <div class="person-card-photo" data-src="${m.photo}" data-initials="${initials}"></div>
                        <div class="person-card-initials" style="display:none;">${initials}</div>
                        <div class="person-card-name">${m.name}</div>
                        <div class="person-card-role">${m.role}</div>
                        ${bioHtml}
                    </div>`;
            });
            html += '</div>';

            // After rendering, test each image and show initials fallback if it fails
            setTimeout(() => {
                document.querySelectorAll('.person-card-photo[data-src]').forEach(div => {
                    const img = new Image();
                    img.onload = () => {
                        div.style.backgroundImage = `url('${div.dataset.src}')`;
                    };
                    img.onerror = () => {
                        div.style.display = 'none';
                        div.nextElementSibling.style.display = 'flex';
                    };
                    img.src = div.dataset.src;
                });
            }, 0);

            return html;
        }

        // Build the quiz ranking HTML
        function buildQuizRanking() {
            const countries = [
                { name: 'Sverige',   flag: '🇸🇪', count: '708 528' },
                { name: 'UK',        flag: '🇬🇧', count: '278 359' },
                { name: 'Norge',     flag: '🇳🇴', count: '172 064' },
                { name: 'Danmark',   flag: '🇩🇰', count: '106 356' },
                { name: 'Finland',   flag: '🇫🇮', count: '58 066' },
                { name: 'Frankrike', flag: '🇫🇷', count: '36 689' },
                { name: 'Irland',    flag: '🇮🇪', count: '19 928' },
                { name: 'Tyskland',  flag: '🇩🇪', count: '19 043' }
            ];
            const medals = ['🥇', '🥈', '🥉', '', '', '', '', ''];
            const maxCount = 708528;

            let html = `<div style="margin-bottom: 20px; line-height: 1.7; color: #4a5e72;">
                <p>Visste du att Agrias mål är att bli det <strong style="color:#002F6C">ledande och mest hållbara djurförsäkringsbolaget i Europa</strong>? Vi finns i <strong style="color:#002F6C">8 länder</strong> och försäkrar totalt nästan <strong style="color:#002F6C">1,4 miljoner djur</strong> (exklusive lantbruksdjur)!</p>
                <p style="margin-top: 10px;">Här är våra länder rankade efter antal försäkrade djur:</p>
            </div>`;
            html += '<ol class="quiz-ranking">';
            countries.forEach((c, i) => {
                const rankClass = i < 3 ? `rank-${i+1}` : '';
                const barWidth = (parseInt(c.count.replace(/\s/g, '')) / maxCount * 100).toFixed(0);
                html += `
                    <li class="${rankClass}">
                        <div class="rank-pos">${i + 1}</div>
                        <span class="rank-flag">${c.flag}</span>
                        <span class="rank-country">${c.name}</span>
                        <span style="color:#5a7088; font-size:0.85rem; margin-left:auto; font-variant-numeric:tabular-nums;">${c.count}</span>
                        ${medals[i] ? `<span class="rank-medal">${medals[i]}</span>` : ''}
                        <div class="rank-bar" style="width: ${barWidth}%"></div>
                    </li>`;
            });
            html += '</ol>';
            html += `<div style="text-align:center; margin-top:16px; padding-top:14px; border-top:1px solid #EEF2F7; color:#5a7088; font-size:0.85rem;">
                Totalt: <strong style="color:#002F6C; font-size:1rem;">1 399 033</strong> försäkrade djur (exkl. lantbruk)
            </div>`;
            return html;
        }

        let pendingWin = false;

        function closeModal() {
            modalOverlay.classList.remove('active');
            if (pendingWin) {
                pendingWin = false;
                setTimeout(showWin, 500);
            }
        }

        modalClose.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // ── Grid toggle ──
        document.getElementById('toggleGrid').addEventListener('click', function() {
            showGrid = !showGrid;
            this.classList.toggle('active', showGrid);
            gridOverlay.classList.toggle('visible', showGrid);
            coordDisplay.classList.toggle('visible', showGrid);

            if (showGrid && gridOverlay.children.length === 0) {
                buildGrid();
            }
        });

        function buildGrid() {
            for (let i = 0; i <= 100; i += 10) {
                const h = document.createElement('div');
                h.className = 'grid-line-h';
                h.style.top = i + '%';
                gridOverlay.appendChild(h);

                const hLabel = document.createElement('div');
                hLabel.className = 'grid-label';
                hLabel.style.top = i + '%';
                hLabel.style.left = '2px';
                hLabel.textContent = i + '%';
                gridOverlay.appendChild(hLabel);

                const v = document.createElement('div');
                v.className = 'grid-line-v';
                v.style.left = i + '%';
                gridOverlay.appendChild(v);

                const vLabel = document.createElement('div');
                vLabel.className = 'grid-label';
                vLabel.style.left = i + '%';
                vLabel.style.top = '2px';
                vLabel.textContent = i + '%';
                gridOverlay.appendChild(vLabel);
            }
        }

        // ── Show zones toggle ──
        document.getElementById('toggleZones').addEventListener('click', function() {
            showZones = !showZones;
            this.classList.toggle('active', showZones);
            document.querySelectorAll('.click-zone:not(.found)').forEach(zone => {
                zone.style.borderColor = showZones ? 'rgba(0,47,108,0.5)' : 'transparent';
                zone.style.background = showZones ? 'rgba(0,47,108,0.08)' : 'transparent';
            });
        });

        // ── Coordinate tracker ──
        errorPanel.addEventListener('mousemove', (e) => {
            if (!showGrid) return;
            const rect = errorPanel.querySelector('img, .image-placeholder');
            if (!rect) return;
            const bounds = rect.getBoundingClientRect();
            const x = ((e.clientX - bounds.left) / bounds.width * 100).toFixed(1);
            const y = ((e.clientY - bounds.top) / bounds.height * 100).toFixed(1);
            coordX.textContent = x;
            coordY.textContent = y;
        });

        // ── Win / Confetti ──
        function showWin() {
            winBanner.classList.add('show');
            launchConfetti();
            setTimeout(() => winBanner.classList.remove('show'), 5000);
        }

        function launchConfetti() {
            const container = document.getElementById('confettiContainer');
        const colors = ['#002F6C', '#1565C0', '#E4002B', '#1976D2', '#0D47A1', '#42A5F5'];

            for (let i = 0; i < 120; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + '%';
                piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                piece.style.width = (Math.random() * 8 + 5) + 'px';
                piece.style.height = (Math.random() * 8 + 5) + 'px';
                piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                piece.style.transform = `rotate(${Math.random() * 360}deg)`;

                const duration = Math.random() * 2 + 2;
                const delay = Math.random() * 0.5;
                piece.style.animation = `confettiFall ${duration}s ${delay}s ease-out forwards`;
                container.appendChild(piece);
            }

            // Add confetti keyframes dynamically
            if (!document.getElementById('confettiStyle')) {
                const style = document.createElement('style');
                style.id = 'confettiStyle';
                style.textContent = `
                    @keyframes confettiFall {
                        0% { top: -20px; opacity: 1; transform: rotate(0deg) translateX(0); }
                        100% { top: 110vh; opacity: 0; transform: rotate(720deg) translateX(${Math.random() > 0.5 ? '' : '-'}80px); }
                    }
                `;
                document.head.appendChild(style);
            }

            // Cleanup
            setTimeout(() => { container.innerHTML = ''; }, 5000);
        }
    </script>
</body>
</html>
